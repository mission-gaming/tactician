name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Detect whether the change set contains anything beyond documentation.
  # Docs-only changes (Markdown, docs/, memory-bank/, .clinerules, LICENSE)
  # skip the test and coverage jobs; job-level skips report as "skipped",
  # which satisfies required status checks (unlike workflow-level path
  # filters, which would leave required checks pending).
  changes:
    runs-on: ubuntu-latest
    name: Detect changes
    outputs:
      code: ${{ steps.filter.outputs.code }}

    steps:
    - uses: actions/checkout@v4

    - name: Check for non-documentation changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          code:
            - '**'
            - '!**/*.md'
            - '!docs/**'
            - '!memory-bank/**'
            - '!.clinerules'
            - '!LICENSE'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']
        experimental: [false]
        include:
          # Pest 2's dependency tree (brianium/paratest ~8.4.0) does not yet
          # allow PHP 8.5, so 8.5 runs with platform requirements ignored and
          # is allowed to fail. Promote to the regular matrix once the test
          # stack is upgraded (Pest 3) with proper 8.5 support.
          - php-version: '8.5'
            experimental: true
      fail-fast: false

    name: PHP ${{ matrix.php-version }}${{ matrix.experimental && ' (experimental)' || '' }}
    continue-on-error: ${{ matrix.experimental }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo, dom, filter, gd, iconv, json, mbstring
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress ${{ matrix.experimental && '--ignore-platform-req=php' || '' }}

    - name: Run CI suite
      run: composer ci

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo, dom, filter, gd, iconv, json, mbstring
        coverage: xdebug

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-8.4-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Prepare build directory
      run: mkdir -p build

    - name: Run tests with coverage
      run: composer test-coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: build/clover.xml
        fail_ci_if_error: true
        flags: php
